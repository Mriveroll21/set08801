<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherLab Home</title>
    <link rel="icon" type="image/png" href="CipherLab Logo/2.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">
                <img src="CipherLab Logo/4.png" alt="CipherLab Logo">
            </a>
            <div class="nav-links">
                <a class="nav-active" href="index.html">Home</a>
                <a href="encode.html">Encode</a>
                <a href="decode.html">Decode</a>
                <a href="learn.html">Learn</a>
            </div>
        </div>
    </nav>

    <section class="main-wrapper">
        <div class="blob blob-left"></div>
        <div class="blob blob-right"></div>

     <div class="hero-content">
      <div class="hero-logo">
       <img src="CipherLab Logo/3.png" alt="">
      </div>
      <p class="hero-description">
        CipherLab is a fun website where users can encode and decode secret messages using simple ciphers. 
        This website helps people learn how encryption works in a simple way.
      </p>
      <a class="cta-button" href="encode.html">
        <span>Start Encoding</span>
      </a>
    </div>
  </section>

    <script>
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.blob');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            blobs.forEach((blob, index) => {
                const direction = index === 0 ? 1 : -1;
                blob.style.transform = `translateY(-50%) translate(${(x - 0.5) * 30 * direction}px, ${(y - 0.5) * 20 * direction}px)`;
            });
        });
    </script>
</body>
</html>
