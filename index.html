<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CipherLab - Encode & Decode Secret Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green-primary: #4ade80;
      --green-light: #86efac;
      --dark-bg: #000000;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--dark-bg);
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Navbar */
 .navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 20px 0;
}

.navbar-container {
  width: 98%;
  margin: 0 auto;
  display: flex;
  align-items: center;
  position: relative; 
}

.logo img {
 
width: 100%;
  max-width: 250px;  
  height: auto;
 
  gap: 8px;
  text-decoration: none;
}

.nav-links {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 40px;
}
    .nav-links a {
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s ease;
      
    }

    .nav-links a:hover {
      color: var(--green-primary);
    }

    .nav-links a.nav-active{
  color: var(--green-primary);
}

   

    /* Hero Section */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--dark-bg);
    }

    /* Gradient Blobs */
    .blob {
      position: absolute;
      width: 400px;
      height: 600px;
      background: radial-gradient(ellipse at center, 
        rgba(74, 222, 128, 0.5) 0%, 
        rgba(74, 222, 128, 0.2) 40%, 
        transparent 70%);
      filter: blur(60px);
      pointer-events: none;
    }

    .blob-left {
      left: -120px;
      top: 50%;
      transform: translateY(-50%);
    }

    .blob-right {
      right: -120px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* Hero Content */
    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 10px;
      max-width: 900px;
    }

    .hero-logo img {
      height: 100%;
  max-height: 500px;  
  width: auto;
  position: relative;
      text-align: center;
margin-top: -90px;
      margin-bottom: -150px;

    }

 

    .hero-description {
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.8);
      max-width: 600px;
      margin: 0 auto 48px;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 9999px;
      background: linear-gradient(135deg, var(--green-primary) 0%, var(--green-light) 100%);
      color: #000;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(74, 222, 128, 0.5);
    }

   

    
    /* Mobile Responsive */
    @media (max-width: 768px) {

    .navbar-container {
    flex-direction: column;
    align-items: center;      
  }

  .nav-links {
    position: static;         
    transform: none;
    gap: 20px;
        flex-wrap: wrap;          
    justify-content: center;
  }

      .blob {
        width: 250px;
        height: 400px;
      }

      .blob-left {
        left: -80px;
      }

      .blob-right {
        right: -80px;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#home" class="logo">
          <img src="CipherLab Logo/4.png">
        
      </a>

      <div class="nav-links">
        <a class="nav-active" href="#home">Home</a>
        <a href="#encode">Encode</a>
        <a href="#decode">Decode</a>
        <a href="#learn">Learn</a>
      </div>
      </div>
  </nav>

  <!-- Hero Section -->
  <section id="home" class="hero">
    <!-- Gradient Blobs -->
    <div class="blob blob-left"></div>
    <div class="blob blob-right"></div>



    <!-- Content -->
    <div class="hero-content">
      <div class="hero-logo">
       <img src="CipherLab Logo/3.png" alt="">
      </div>
      <p class="hero-description">
        CipherLab is a fun website where users can encode and decode secret messages using simple ciphers. 
        This website helps people learn how encryption works in a simple way.
      </p>
      <button class="cta-button" onclick="startEncoding()">
        <span>Start Encoding</span>
      </button>
    </div>
  </section>

  <script>
    

    // CTA Button (Temporary)
    function startEncoding() {
      alert('Encoding feature coming soon!');
      
    }

    // Bolb mouse effect
    document.addEventListener('mousemove', (e) => {
      const blobs = document.querySelectorAll('.blob');
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      
      blobs.forEach((blob, index) => {
        const direction = index === 0 ? 1 : -1;
        const moveX = (x - 0.5) * 30 * direction;
        const moveY = (y - 0.5) * 20 * direction;
        blob.style.transform = `translateY(-50%) translate(${moveX}px, ${moveY}px)`;
      });
    });
  </script>
</body>
</html>
